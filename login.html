<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenodix Hub - Acceso Corporativo</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="hub.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; background-color: #F4F7FE; }
        .auth-container { display: flex; width: 900px; max-width: 95%; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; min-height: 500px; }
        .auth-left { flex: 1; background: #125191; color: white; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .auth-left h2 { color: white; font-size: 2rem; margin-bottom: 16px; font-weight: 700;}
        .auth-left p { color: rgba(255,255,255,0.8); font-size: 1.1rem; }
        .auth-right { flex: 1; padding: 50px 40px; display: flex; flex-direction: column; justify-content: center; }
        .auth-right h3 { margin-bottom: 24px; font-size: 1.5rem; color: #125191; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: #333; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; outline: none; font-size: 1rem; }
        .form-group input:focus { border-color: #125191; }
        .auth-switch { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #64748b; }
        .auth-switch a { color: #125191; font-weight: 600; cursor: pointer; text-decoration: none; }
        .auth-alert { padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; display: none; }
        .alert-error { background: #fee2e2; color: #b91c1c; border: 1px solid #f87171; }
        .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
        @media (max-width: 768px) { .auth-container { flex-direction: column; } .auth-left { padding: 30px; text-align: center; } }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Lado Visual -->
        <div class="auth-left">
            <div class="logo-box" style="color:white; margin-bottom: 40px;">
                <span class="material-symbols-outlined logo-icon">blur_on</span>
                <span class="logo-text" style="color:white;">ZENODIX HUB</span>
            </div>
            <h2>Sistema Operativo B2B</h2>
            <p>Conecta, automatiza y escala tu negocio. Autenticación encriptada Multi-Tenant.</p>
        </div>

        <!-- Formulario Login -->
        <div class="auth-right" id="loginFormContainer">
            <h3>Iniciar Sesión</h3>
            <div id="loginAlert" class="auth-alert alert-error"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Correo Electrónico Corporativo</label>
                    <input type="email" id="loginEmail" placeholder="tu@empresa.com">
                </div>
                <div class="form-group">
                    <label>Contraseña Segura</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="btnLogin">Entrar al Ecosistema</button>
            </form>
            <div class="auth-switch">
                ¿Aún no tienes cuenta? <a onclick="toggleAuthMode()">Registra tu Empresa</a>
            </div>
        </div>

        <!-- Formulario Registro (Oculto por defecto) -->
        <div class="auth-right" id="registerFormContainer" style="display: none;">
            <h3>Registro Corporativo</h3>
            <div id="registerAlert" class="auth-alert"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="regName" required placeholder="Ej: Carlos Pérez">
                </div>
                <div class="form-group">
                    <label>Correo Corporativo</label>
                    <input type="email" id="regEmail" required placeholder="tu@empresa.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="regPassword" required placeholder="Mínimo 6 caracteres">
                </div>
                <button type="submit" class="btn btn-secondary btn-full" id="btnRegister">Crea tu Cuenta B2B</button>
            </form>
            <div class="auth-switch">
                ¿Ya eres cliente? <a onclick="toggleAuthMode()">Inicia Sesión</a>
            </div>
        </div>
    </div>

    <!-- SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>
</html>
